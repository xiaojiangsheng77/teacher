</head>

    // 解析课程字符串
    function parseCourse(courseStr) {
        if (!courseStr || courseStr === '') return null;
        
        const match = courseStr.match(/^(.+?)\((.+?)\)$/);
        if (match) {
            return {
                name: match[1].trim(),
                grade: match[2].trim()
            };
        }
        return {
            name: courseStr,
            grade: ''
        };
    }

    // 检测是否为合并单元格
    function isMergedCourse(courseStr) {
        if (!courseStr) return false;
        return courseStr.includes('/') || courseStr.includes('、') || courseStr.includes('，');
    }

    // 处理合并单元格
    function parseMergedCourse(courseStr) {
        if (!courseStr) return [];
        
        const separators = ['/', '、', '，', ','];
        let courses = [courseStr];
        
        for (let sep of separators) {
            if (courseStr.includes(sep)) {
                courses = courseStr.split(sep).map(c => c.trim()).filter(c => c);
                break;
            }
        }
        
        return courses.map(c => parseCourse(c)).filter(c => c !== null);
    }

    scheduleMap.set('陈柯言', {
        Monday: ['', '语文(四年级)', '语文(四年级)', '科学(四年级)', '', '', '艺术(四年级)'],
        Tuesday: ['', '语文(四年级)', '道德与法治(四年级)', '', '', '', '艺术(四年级)'],
        Wednesday: ['', '', '', '地方课程(四年级)', '艺术(四年级)', '语文(四年级)', '道德与法治(四年级)'],
        Thursday: ['', '艺术(四年级)', '', '', '语文(四年级)', '劳动(四年级)', ''],
        Friday: ['', '语文(四年级)', '语文(四年级)', '科学(四年级)', '', '', '']
    });

    // 8. 张梅芳
    scheduleMap.set('张梅芳', {
        Monday: ['', '数学(五年级)', '数学(五年级)', '', '综合实践(四年级)', '体育与健康(四年级)', ''],
        Tuesday: ['', '', '', '数学(四年级)', '数学(四年级)', '', ''],
        Wednesday: ['', '数学(四年级)', '数学(四年级)', '', '综合实践(五年级)', '', ''],
        Thursday: ['', '', '', '地方课程(五年级)', '校本教研(五年级)', '体育与健康(四年级)', ''],
        Friday: ['', '数学(五年级)', '数学(五年级)', '信息技术(五年级)', '', '体育与健康(四年级)', '信息技术(四年级)']
    });

    // 9. 何柳
    scheduleMap.set('何柳', {
        Monday: ['', '', '', '语文(五年级)', '英语(五年级)', '艺术(五年级)', '语文(五年级)'],
        Tuesday: ['', '语文(五年级)', '语文(五年级)', '语文(五年级)', '', '', ''],
        Wednesday: ['', '语文(五年级)', '语文(五年级)', '艺术(五年级)', '', '', '劳动(六年级)'],
        Thursday: ['', '英语(五年级)', '艺术(五年级)', '', '', '', '艺术(五年级)'],
        Friday: ['', '', '', '英语(六年级)', '英语(六年级)', '', '']
    });

    // 10. 罗超
    scheduleMap.set('罗超', {
        Monday: ['', '语文(六年级)', '道德与法治(六年级)', '', '', '艺术(六年级)', ''],
        Tuesday: ['', '', '', '语文(六年级)', '信息技术(六年级)', '', '艺术(六年级)'],
        Wednesday: ['', '语文(六年级)', '语文(六年级)', '', '', '语文(六年级)', ''],
        Thursday: ['', '', '', '语文(六年级)', '艺术(六年级)', '', '道德与法治(六年级)'],
        Friday: ['', '语文(六年级)', '综合实践(六年级)', '', '', '劳动(一年级)', '']
    });

    // 11. 刘发国
    scheduleMap.set('刘发国', {
        Monday: ['', '', '', '科学(六年级)', '体育与健康(六年级)', '', '科学(六年级)'],
        Tuesday: ['', '数学(六年级)', '数学(六年级)', '', '劳动(五年级)', '体育与健康(六年级)', ''],
        Wednesday: ['', '', '', '数学(六年级)', '体育与健康(六年级)', '', ''],
        Thursday: ['', '数学(六年级)', '数学(六年级)', '', '', '', ''],
        Friday: ['', '', '', '', '', '校本教研(六年级)', '地方课程(六年级)']
    });

    // ---------- DOM 元素 ----------
    const searchBtn = document.getElementById('searchBtn');
    const teacherInput = document.getElementById('teacherNameInput');
    const teacherBar = document.getElementById('teacherBar');
    const currentDisplay = document.getElementById('currentTeacherDisplay');
    const teacherStats = document.getElementById('teacherStats');
    const totalClassesDisplay = document.getElementById('totalClassesDisplay');
    const timetableDiv = document.getElementById('timetableContainer');
    const saveBtn = document.getElementById('saveAsImageBtn');
    const toast = document.getElementById('liveToast');
    const toastText = document.getElementById('toastText');

    function showMessage(msg, duration = 2000) {
        toastText.innerText = msg;
        toast.style.display = 'flex';
        setTimeout(() => { toast.style.display = 'none'; }, duration);
    }

    // 计算教师总课时
    function calculateTotalClasses(data) {
        let total = 0;
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
        for (let day of days) {
            const dayCourses = data[day] || [];
            for (let period = 1; period <= 6; period++) {
                if (dayCourses[period] && dayCourses[period].trim() !== '') {
                    total++;
                }
            }
        }
        return total;
    }

    // 生成课程单元格
    function generateCourseCell(courseStr) {
        if (!courseStr || courseStr.trim() === '') {
            return `<td class="empty-cell">—</td>`;
        }
        
        const trimmed = courseStr.trim();
        
        if (isMergedCourse(trimmed)) {
            const courses = parseMergedCourse(trimmed);
            let html = `<td class="course-cell merged-cell"><div class="merged-content">`;
            
            courses.forEach((course, index) => {
                if (course) {
                    html += `<div style="margin-bottom: ${index < courses.length-1 ? '6px' : '0'};">`;
                    html += `<span class="course-name">${course.name}</span>`;
                    if (course.grade) {
                        html += `<span class="course-grade">${course.grade}</span>`;
                    }
                    if (courses.length > 1) {
                        html += `<span class="merged-badge" style="margin-left: 4px;">合</span>`;
                    }
                    html += `</div>`;
                }
            });
            
            html += `</div></td>`;
            return html;
        }
        
        const course = parseCourse(trimmed);
        if (course) {
            return `<td class="course-cell">
                <span class="course-name">${course.name}</span>
                ${course.grade ? `<span class="course-grade">${course.grade}</span>` : ''}
            </td>`;
        }
        
        return `<td class="empty-cell">${trimmed}</td>`;
    }

    // 根据时段类型返回背景色类
    function getBgClass(type) {
        switch(type) {
            case 'morning': return 'morning-bg';
            case 'break': return 'break-bg';
            case 'lunch': return 'lunch-bg';
            case 'evening': return 'evening-bg';
            default: return '';
        }
    }

    // 生成公共时段行（第一列时间，第二列到第六列合并居中显示时段名称）
    function generatePublicTimeRow(period) {
        const bgClass = getBgClass(period.type);
        
        // 第一列：时间
        let timeColumn = `<td class="time-column ${bgClass}">
            <span class="time-range">${period.start}-${period.end}</span>
        </td>`;
        
        // 第二列到第六列：合并5列，居中显示时段名称
        let mergedColumn = `<td class="public-time-merged ${bgClass}" colspan="5">
            <span class="public-time-name-large">${period.name}</span>
            ${period.desc ? `<span class="public-time-desc">${period.desc}</span>` : ''}
        </td>`;
        
        return `<tr>${timeColumn}${mergedColumn}</tr>`;
    }

    // 渲染完整作息课表
    function renderTimetable(teacherName) {
        if (!teacherName) return false;
        const trimmed = teacherName.trim();
        const data = scheduleMap.get(trimmed);
        if (!data) {
            teacherBar.style.display = 'none';
            timetableDiv.innerHTML = `<div class="empty-state">😕 没有找到 “${trimmed}” 的课表。<br>可查询：丁素花, 张灏馨, 田永帅, 杨朝云, 温月利, 刘仕平, 陈柯言, 张梅芳, 何柳, 罗超, 刘发国</div>`;
            return false;
        }

        const totalClasses = calculateTotalClasses(data);
        
        teacherBar.style.display = 'flex';
        currentDisplay.innerText = trimmed;
        totalClassesDisplay.innerText = totalClasses;

        let html = `<div class="table-container"><table id="teacherScheduleTable">`;
        
        // 表头 - 第一列显示"时间"，后面五列分别显示星期一至星期五
        html += `<thead><tr>`;
        html += `<th>时间</th>`;
        html += `<th>星期一</th><th>星期二</th><th>星期三</th><th>星期四</th><th>星期五</th>`;
        html += `</tr></thead><tbody>`;

        // 按完整作息时间表循环
        for (let period of dailySchedule) {
            if (period.type === 'class') {
                // 课程时段 - 正常显示（第一列时间，后五列课程）
                const periodNum = period.period;
                html += `<tr class="class-period-row">`;
                html += `<td class="time-column">${period.name}<span class="time-range">${period.start}-${period.end}</span></td>`;
                
                const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
                for (let day of days) {
                    const dayCourses = data[day] || Array(7).fill('');
                    let course = dayCourses[periodNum] || '';
                    html += generateCourseCell(course);
                }
                html += `</tr>`;
            } else if (period.isPublic) {
                // 公共时段 - 第一列时间，第二列到第六列合并居中显示时段名称
                html += generatePublicTimeRow(period);
            }
        }
        
        html += `</tbody></table></div>`;
        
        timetableDiv.innerHTML = html;
        return true;
    }

    // 初始显示
    renderTimetable('丁素花');
    teacherInput.value = '丁素花';

    searchBtn.addEventListener('click', () => {
        const name = teacherInput.value.trim();
        if (name === '') {
            showMessage('请输入教师姓名', 1500);
            return;
        }
        const success = renderTimetable(name);
        if (success) showMessage(`已加载 ${name} 的完整作息课表`);
        else showMessage(`未找到教师 “${name}”`, 1600);
    });

    teacherInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchBtn.click();
    });

    // 保存完整课表图片
    saveBtn.addEventListener('click', async function() {
        const teacherName = currentDisplay.innerText;
        if (!teacherName || !scheduleMap.has(teacherName)) {
            showMessage('无课表可保存', 1500);
            return;
        }

        showMessage('正在生成图片...', 2000);
        
        const saveContainer = document.createElement('div');
        saveContainer.id = 'save-container';
        saveContainer.style.background = 'white';
        saveContainer.style.padding = '40px';
        saveContainer.style.borderRadius = '40px';
        
        // 标题 - 改为"课程表(总节数)"
        const titleDiv = document.createElement('div');
        titleDiv.style.marginBottom = '30px';
        titleDiv.style.padding = '20px 30px';
        titleDiv.style.background = 'linear-gradient(135deg, #05445E, #1e7fb0)';
        titleDiv.style.borderRadius = '30px';
        titleDiv.style.color = 'white';
        titleDiv.style.fontWeight = 'bold';
        titleDiv.style.fontSize = '2.2rem';
        titleDiv.style.display = 'flex';
        titleDiv.style.alignItems = 'center';
        titleDiv.style.justifyContent = 'space-between';
        
        // 获取总课时
        const data = scheduleMap.get(teacherName);
        const totalClasses = calculateTotalClasses(data);
        
        titleDiv.innerHTML = `
            <span>📚 ${teacherName} 课程表 (${totalClasses}节)</span>
            <span style="font-size:1.2rem; background: rgba(255,255,255,0.2); padding: 8px 25px; border-radius: 40px;">${new Date().toLocaleDateString()}</span>
        `;
        saveContainer.appendChild(titleDiv);
        
        // 表格
        const tableClone = document.getElementById('teacherScheduleTable').cloneNode(true);
        tableClone.style.width = '100%';
        tableClone.style.minWidth = '1000px';
        saveContainer.appendChild(tableClone);
        
        saveContainer.style.position = 'absolute';
        saveContainer.style.left = '-9999px';
        saveContainer.style.top = '0';
        document.body.appendChild(saveContainer);
        
        try {
            const canvas = await html2canvas(saveContainer, {
                scale: 2.5,
                backgroundColor: '#ffffff',
                logging: false,
                allowTaint: true,
                useCORS: true,
                windowWidth: saveContainer.scrollWidth,
                windowHeight: saveContainer.scrollHeight
            });
            
            const link = document.createElement('a');
            link.download = `${teacherName}_课程表.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            document.body.removeChild(saveContainer);
            showMessage('✅ 课程表已保存', 2500);
            
        } catch (error) {
            console.error('截图失败:', error);
            document.body.removeChild(saveContainer);
            showMessage('❌ 图片生成失败，请重试', 2000);
        }
    });
})();
</script>
