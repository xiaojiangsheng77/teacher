<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>富村镇新坪小学智能课程表</title>
    <!-- html2canvas 用于课表转图片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #05445E 0%, #1e7fb0 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .card {
            max-width: 1600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: min(60px, 8vw);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.5);
            padding: min(40px, 5vw) min(40px, 5vw);
            border: 1px solid rgba(255,255,255,0.9);
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 800;
            color: #05445E;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            white-space: normal;
            line-height: 1.3;
            word-break: break-word;
        }

        h1 small {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            background: linear-gradient(135deg, #1e7fb0, #05445E);
            color: white;
            padding: min(8px, 2vw) min(24px, 4vw);
            border-radius: 60px;
            font-weight: 500;
            display: inline-block;
            margin-left: clamp(5px, 2vw, 15px);
            white-space: nowrap;
        }

        .subtitle {
            color: #2c5a7a;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            margin-bottom: clamp(20px, 4vw, 30px);
            text-align: center;
            background: rgba(30, 127, 176, 0.05);
            padding: clamp(10px, 2vw, 15px);
            border-radius: 40px;
        }

        /* 横屏提示条 - 只在手机竖屏时显示 */
        .landscape-tip {
            display: none;
            background: #1e7fb0;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            margin-bottom: 15px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.8; }
        }

        /* 竖屏且屏幕宽度小于800px时显示提示 */
        @media (max-width: 800px) and (orientation: portrait) {
            .landscape-tip {
                display: block;
            }
        }

        /* 横屏时优化显示 */
        @media (orientation: landscape) and (max-width: 900px) {
            .card {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
                margin-bottom: 5px;
            }
            
            .search-panel {
                margin-bottom: 15px;
            }
            
            .teacher-bar {
                margin: 10px 0 15px 0;
                padding: 10px 20px;
            }
            
            .timetable-wrap {
                padding: 15px;
            }
            
            /* 横屏时表格自动适配宽度 */
            table {
                min-width: 100%;
                font-size: 0.9rem;
            }
            
            th {
                padding: 8px 4px;
                font-size: 1rem;
            }
            
            td {
                padding: 6px 3px;
            }
            
            .time-column {
                padding: 6px 3px !important;
                width: auto;
                min-width: 70px;
            }
            
            .course-name {
                font-size: 0.9rem;
            }
            
            .course-grade {
                font-size: 0.8rem;
                padding: 2px 4px;
            }
        }

        .search-panel {
            background: white;
            border-radius: 100px;
            padding: 6px 6px 6px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            box-shadow: 0 20px 40px -15px #05445E99;
            margin-bottom: clamp(20px, 4vw, 40px);
            border: 2px solid rgba(30, 127, 176, 0.2);
            transition: all 0.3s;
        }

        .search-panel:focus-within {
            border-color: #1e7fb0;
            box-shadow: 0 25px 45px -15px #05445E;
        }

        .search-panel label {
            color: #05445E;
            font-weight: 700;
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        #teacherNameInput {
            flex: 1 1 200px;
            min-width: 150px;
            border: none;
            padding: clamp(12px, 3vw, 18px) clamp(16px, 4vw, 28px);
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            background: #f0f8ff;
            border-radius: 60px;
            outline: none;
            transition: 0.3s;
            color: #01273b;
            font-weight: 500;
            border: 2px solid transparent;
        }

        #teacherNameInput:focus {
            background: #ffffff;
            border-color: #1e7fb0;
            box-shadow: 0 0 0 5px rgba(30, 127, 176, 0.2);
        }

        .search-panel button {
            background: linear-gradient(135deg, #05445E, #1e7fb0);
            border: none;
            color: white;
            padding: clamp(12px, 3vw, 18px) clamp(24px, 5vw, 48px);
            border-radius: 60px;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px #05445E;
            border: 2px solid rgba(255,255,255,0.3);
            white-space: nowrap;
        }

        .search-panel button:hover {
            background: linear-gradient(135deg, #1e7fb0, #05445E);
            transform: translateY(-3px);
            box-shadow: 0 20px 35px #05445E;
        }

        .teacher-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: clamp(15px, 3vw, 20px) 0 clamp(20px, 4vw, 30px) 0;
            background: linear-gradient(135deg, #e3f0fa, #d4e9f7);
            border-radius: 80px;
            padding: clamp(12px, 3vw, 20px) clamp(20px, 4vw, 40px);
            border: 2px solid white;
            box-shadow: 0 15px 25px -10px #05445E66;
            flex-wrap: wrap;
            gap: 15px;
        }

        .teacher-name {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 800;
            color: #05445E;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .teacher-name::before {
            content: "👩‍🏫";
            font-size: clamp(1.5rem, 5vw, 2.5rem);
        }

        .teacher-stats {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            color: #1e7fb0;
            white-space: nowrap;
        }

        .class-count {
            color: #05445E;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 800;
            margin: 0 5px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-outline {
            background: white;
            border: 3px solid #1e7fb0;
            color: #05445E;
            padding: clamp(10px, 2.5vw, 14px) clamp(20px, 4vw, 35px);
            border-radius: 60px;
            font-weight: 700;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-outline:hover {
            background: #1e7fb0;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px #1e7fb0;
            border-color: white;
        }

        .timetable-wrap {
            background: white;
            border-radius: min(40px, 5vw);
            padding: clamp(15px, 3vw, 30px);
            box-shadow: 0 30px 50px -20px #05445E;
            border: 2px solid rgba(255,255,255,0.9);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            /* 横屏时自动适应高度 */
            min-height: auto;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
            border-radius: min(30px, 4vw);
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            min-width: 800px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        th {
            background: linear-gradient(135deg, #B8E2F2, #9AC9E0);
            color: #05445E;
            font-weight: 800;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
            padding: clamp(10px, 2vw, 20px) clamp(6px, 1.5vw, 12px);
            text-align: center;
            border: 2px solid #000000;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        td {
            background: white;
            padding: clamp(8px, 1.5vw, 15px) clamp(5px, 1vw, 10px);
            text-align: center;
            border: 2px solid #000000;
            color: #02314a;
            vertical-align: middle;
            font-weight: 500;
            white-space: nowrap;
        }

        .time-column {
            background: linear-gradient(135deg, #E6F4FA, #D4E9F2);
            font-weight: 700;
            color: #05445E;
            text-align: center !important;
            padding: clamp(8px, 1.5vw, 15px) clamp(5px, 1vw, 10px) !important;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            position: sticky;
            left: 0;
            z-index: 5;
            width: 100px;
            border: 2px solid #000000;
            white-space: nowrap;
        }
        
        .time-range {
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            color: #1e7fb0;
            font-weight: 500;
            display: block;
            margin-top: 3px;
            font-family: monospace;
            background: rgba(30, 127, 176, 0.1);
            padding: 2px 6px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .public-time-merged {
            text-align: center !important;
            vertical-align: middle !important;
            padding: clamp(12px, 2.5vw, 25px) clamp(5px, 1vw, 10px) !important;
            font-weight: 700;
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            color: #05445E;
            background: white !important;
            border: 2px solid #000000;
            white-space: normal;
            word-break: break-word;
        }
        
        .public-time-desc {
            font-size: clamp(1rem, 3.5vw, 1.3rem);
            font-weight: 700;
            color: #05445E;
            display: block;
            line-height: 1.4;
        }

        .course-cell {
            background-color: white;
            padding: clamp(6px, 1.2vw, 12px) clamp(4px, 0.8vw, 8px);
            line-height: 1.4;
            transition: all 0.2s;
            border: 2px solid #000000;
        }
        
        .course-name {
            font-weight: 700;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            display: block;
            margin-bottom: 3px;
            white-space: nowrap;
        }
        
        .course-grade {
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            color: #1e7fb0;
            background: rgba(30, 127, 176, 0.1);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 30px;
            white-space: nowrap;
        }
        
        /* 不同课程名称的颜色保持不变 */
        .course-name-语文 { color: #B22222; }
        .course-name-数学 { color: #00008B; }
        .course-name-英语 { color: #006400; }
        .course-name-艺术 { color: #800080; }
        .course-name-体育与健康 { color: #FF8C00; }
        .course-name-道德与法治 { color: #008B8B; }
        .course-name-科学 { color: #8B4513; }
        .course-name-信息技术 { color: #4B0082; }
        .course-name-综合实践 { color: #2F4F4F; }
        .course-name-劳动 { color: #8B5A2B; }
        .course-name-校本教研 { color: #483D8B; }
        .course-name-地方课程 { color: #228B22; }
        
        .merged-cell {
            background: white;
            border: 2px solid #000000;
        }
        
        .merged-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .merged-badge {
            background: #1e7fb0;
            color: white;
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            padding: 2px 6px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .empty-cell {
            color: #b0c9dd;
            font-style: italic;
            background: white;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            border: 2px solid #000000;
        }

        .footer-note {
            text-align: right;
            color: #4a6f88;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            margin-top: 15px;
        }

        .toast {
            background: linear-gradient(135deg, #05445E, #1e7fb0);
            color: white;
            padding: clamp(12px, 3vw, 18px) clamp(20px, 5vw, 40px);
            border-radius: 80px;
            font-weight: 600;
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            box-shadow: 0 25px 45px #022b40;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: none;
            align-items: center;
            gap: 10px;
            border: 3px solid white;
            white-space: nowrap;
        }

        .empty-state {
            text-align: center;
            padding: clamp(40px, 8vw, 80px) clamp(15px, 4vw, 30px);
            background: linear-gradient(135deg, #f8fcff, #ecf5fc);
            border-radius: 40px;
            color: #1e7fb0;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            border: 3px dashed #1e7fb0;
            line-height: 1.5;
            word-break: break-word;
        }

        #save-container {
            background: white;
            border-radius: 40px;
            padding: clamp(20px, 4vw, 40px);
            display: inline-block;
            width: auto;
            min-width: 100%;
        }

        /* 超小屏幕优化 */
        @media (max-width: 480px) and (orientation: portrait) {
            .search-panel {
                flex-direction: column;
                align-items: stretch;
                border-radius: 30px;
                padding: 15px;
            }
            
            .search-panel label {
                justify-content: center;
            }
            
            .search-panel button {
                justify-content: center;
            }
            
            .teacher-bar {
                flex-direction: column;
                text-align: center;
            }
            
            .btn-group {
                width: 100%;
            }
            
            .btn-outline {
                width: 100%;
                justify-content: center;
            }
            
            .time-column {
                width: 80px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>
      课程表智能托管系统
        <small>教师查询系统</small>
    </h1>
    
    <!-- 横屏提示条 - 只在手机竖屏时显示 -->
    <div class="landscape-tip">
        ⬅️ 左右滑动查看完整课表 · 建议横屏浏览 ➡️
    </div>
    
    <div class="subtitle">👇 输入教师姓名，查看完整作息安排</div>

    <div class="search-panel">
        <label for="teacherNameInput">🔍 教师姓名</label>
        <input type="text" id="teacherNameInput" placeholder="例如：丁素花, 张灏馨, 田永帅..." value="丁素花">
        <button id="searchBtn">📋 查询课表</button>
    </div>

    <div id="teacherBar" class="teacher-bar" style="display: none;">
        <div id="currentTeacherDisplay" class="teacher-name"></div>
        <div class="teacher-stats" id="teacherStats">
            <span class="class-count" id="totalClassesDisplay">0</span>节
        </div>
        <div class="btn-group">
            <button class="btn-outline" id="saveAsImageBtn">📸 保存课表</button>
        </div>
    </div>

    <div id="timetableContainer" class="timetable-wrap">
        <!-- 动态渲染 -->
    </div>

    <div class="footer-note">
        ⏰ 左右滑动查看完整课表 · 点击保存可生成图片
    </div>
</div>

<div id="liveToast" class="toast">
    <span>✅</span> <span id="toastText">操作成功</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

    // 张灏馨 (22节)
    scheduleMap.set('张灏馨', {

    // ---------- 工具函数 ----------
    function parseCourse(courseStr) {
        if (!courseStr || courseStr === '') return null;
        const match = courseStr.match(/^(.+?)\((.+?)\)$/);
        if (match) {
            return { name: match[1].trim(), grade: match[2].trim() };
        }
        return { name: courseStr, grade: '' };
    }

    function isMergedCourse(courseStr) {
        if (!courseStr) return false;
        return courseStr.includes('/') || courseStr.includes('、') || courseStr.includes('，');
    }

    function parseMergedCourse(courseStr) {
        if (!courseStr) return [];
        const separators = ['/', '、', '，', ','];
        let courses = [courseStr];
        for (let sep of separators) {
            if (courseStr.includes(sep)) {
                courses = courseStr.split(sep).map(c => c.trim()).filter(c => c);
                break;
            }
        }
        return courses.map(c => parseCourse(c)).filter(c => c !== null);
    }

    function calculateTotalClasses(data) {
        let total = 0;
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
        for (let day of days) {
            const dayCourses = data[day] || [];
            for (let period = 1; period <= 6; period++) {
                if (dayCourses[period] && dayCourses[period].trim() !== '') {
                    total++;
                }
            }
        }
        return total;
    }

    function getCourseColorClass(courseName) {
        const colorMap = {
            '语文': '语文',
            '数学': '数学',
            '英语': '英语',
            '艺术': '艺术',
            '体育与健康': '体育与健康',
            '道德与法治': '道德与法治',
            '科学': '科学',
            '信息技术': '信息技术',
            '综合实践': '综合实践',
            '劳动': '劳动',
            '校本教研': '校本教研',
            '地方课程': '地方课程'
        };
        return colorMap[courseName] ? `course-name-${colorMap[courseName]}` : '';
    }

    function generateCourseCell(courseStr) {
        if (!courseStr || courseStr.trim() === '') {
            return `<td class="empty-cell">—</td>`;
        }
        
        const trimmed = courseStr.trim();
        
        if (isMergedCourse(trimmed)) {
            const courses = parseMergedCourse(trimmed);
            let html = `<td class="course-cell merged-cell"><div class="merged-content">`;
            courses.forEach((course, index) => {
                if (course) {
                    const colorClass = getCourseColorClass(course.name);
                    html += `<div style="margin-bottom: ${index < courses.length-1 ? '6px' : '0'};">`;
                    html += `<span class="course-name ${colorClass}">${course.name}</span>`;
                    if (course.grade) {
                        html += `<span class="course-grade">${course.grade}</span>`;
                    }
                    if (courses.length > 1) {
                        html += `<span class="merged-badge" style="margin-left: 4px;">合</span>`;
                    }
                    html += `</div>`;
                }
            });
            html += `</div></td>`;
            return html;
        }
        
        const course = parseCourse(trimmed);
        if (course) {
            const colorClass = getCourseColorClass(course.name);
            return `<td class="course-cell">
                <span class="course-name ${colorClass}">${course.name}</span>
                ${course.grade ? `<span class="course-grade">${course.grade}</span>` : ''}
            </td>`;
        }
        
        return `<td class="empty-cell">${trimmed}</td>`;
    }

    function generatePublicTimeRow(period) {
        let timeColumn = `<td class="time-column">
            <span class="time-range">${period.start}-${period.end}</span>
        </td>`;
        let mergedColumn = `<td class="public-time-merged" colspan="5">
            <span class="public-time-desc">${period.desc}</span>
        </td>`;
        return `<tr>${timeColumn}${mergedColumn}</tr>`;
    }

    function renderTimetable(teacherName) {
        if (!teacherName) return false;
        const trimmed = teacherName.trim();
        const data = scheduleMap.get(trimmed);
        if (!data) {
            document.getElementById('teacherBar').style.display = 'none';
            document.getElementById('timetableContainer').innerHTML = `<div class="empty-state">😕 没有找到 “${trimmed}” 的课表。<br>可查询：丁素花, 张灏馨, 田永帅, 杨朝云, 温月利, 刘仕平, 陈柯言, 张梅芳, 何柳, 罗超, 刘发国</div>`;
            return false;
        }

        const totalClasses = calculateTotalClasses(data);
        
        document.getElementById('teacherBar').style.display = 'flex';
        document.getElementById('currentTeacherDisplay').innerText = trimmed;
        document.getElementById('totalClassesDisplay').innerText = totalClasses;

        let html = `<div class="table-container"><table id="teacherScheduleTable"><thead><tr><th>时间</th><th>星期一</th><th>星期二</th><th>星期三</th><th>星期四</th><th>星期五</th></tr></thead><tbody>`;

        for (let period of dailySchedule) {
            if (period.type === 'class') {
                const periodNum = period.period;
                html += `<tr><td class="time-column">${period.name}<span class="time-range">${period.start}-${period.end}</span></td>`;
                const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
                for (let day of days) {
                    const dayCourses = data[day] || Array(7).fill('');
                    let course = dayCourses[periodNum] || '';
                    html += generateCourseCell(course);
                }
                html += `</tr>`;
            } else if (period.isPublic) {
                html += generatePublicTimeRow(period);
            }
        }
        
        html += `</tbody></table></div>`;
        document.getElementById('timetableContainer').innerHTML = html;
        return true;
    }

        showMessage('✅ 课程表已保存', 2500);
    });
